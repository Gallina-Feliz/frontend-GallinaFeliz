<h2 class="text-2xl font-bold text-[#4295e2] mb-8 text-center">Formulario de Registro de Especies</h2>
<div class="flex items-center justify-center p-12">
  <div class="mx-auto w-full max-w-[550px] bg-white">
    <app-alert-form [successMessage]="successMessage" [errorMessage]="errorMessage"></app-alert-form>
    <form [formGroup]="GallinaForm" (ngSubmit)="onSubmit()">
      <div class="mb-5">
        <label for="codigo_gallina" class="mb-3 block text-base font-medium text-[#07074D]">
          Código de la gallina
        </label>
        <input formControlName="codigo_gallina" type="text" id="codigo_gallina" placeholder="Código de la gallina"
               class="w-full rounded-md border border-[#e0e0e0] bg-white py-3 px-6 text-base font-medium text-[#6B7280] outline-none focus:border-[#6A64F1] focus:shadow-md" />
      </div>

      <div class="mb-5">
        <label for="raza" class="mb-3 block text-base font-medium text-[#07074D]">
          Raza
        </label>
        <input formControlName="raza" type="text" id="raza" placeholder="Raza"
               class="w-full rounded-md border border-[#e0e0e0] bg-white py-3 px-6 text-base font-medium text-[#6B7280] outline-none focus:border-[#6A64F1] focus:shadow-md" />
      </div>

      <div class="mb-5">
        <label for="edad" class="mb-3 block text-base font-medium text-[#07074D]">
          Edad
        </label>
        <input formControlName="edad" type="text" id="edad" placeholder="Edad"
               class="w-full rounded-md border border-[#e0e0e0] bg-white py-3 px-6 text-base font-medium text-[#6B7280] outline-none focus:border-[#6A64F1] focus:shadow-md" />
      </div>

      <div class="mb-5">
        <label for="numero_galpon" class="mb-3 block text-base font-medium text-[#07074D]">
          Número de galpón
        </label>
        <input formControlName="numero_galpon" type="text" id="numero_galpon" placeholder="Número de galpón"
               class="w-full rounded-md border border-[#e0e0e0] bg-white py-3 px-6 text-base font-medium text-[#6B7280] outline-none focus:border-[#6A64F1] focus:shadow-md" />
      </div>

      <div class="mb-5">
        <label for="huevos_diarios" class="mb-3 block text-base font-medium text-[#07074D]">
          Huevos diarios
        </label>
        <input formControlName="huevos_diarios" type="text" id="huevos_diarios" placeholder="Huevos diarios"
               class="w-full rounded-md border border-[#e0e0e0] bg-white py-3 px-6 text-base font-medium text-[#6B7280] outline-none focus:border-[#6A64F1] focus:shadow-md" />
      </div>

      <div class="mb-5">
        <label for="temp" class="mb-3 block text-base font-medium text-[#07074D]">
          Temperatura
        </label>
        <input formControlName="temp" type="text" id="temp" placeholder="Temperatura"
               class="w-full rounded-md border border-[#e0e0e0] bg-white py-3 px-6 text-base font-medium text-[#6B7280] outline-none focus:border-[#6A64F1] focus:shadow-md" />
      </div>

      <div class="mb-5">
        <label for="esta_enferma" class="mb-3 block text-base font-medium text-[#07074D]">
          ¿Está enferma?
        </label>
        <input formControlName="esta_enferma" type="text" id="esta_enferma" placeholder="¿Está enferma?"
               class="w-full rounded-md border border-[#e0e0e0] bg-white py-3 px-6 text-base font-medium text-[#6B7280] outline-none focus:border-[#6A64F1] focus:shadow-md" />
      </div>

      <div class="mb-5">
        <label for="que_enfermedad" class="mb-3 block text-base font-medium text-[#07074D]">
          ¿Qué enfermedad?
        </label>
        <input formControlName="que_enfermedad" type="text" id="que_enfermedad" placeholder="¿Qué enfermedad?"
               class="w-full rounded-md border border-[#e0e0e0] bg-white py-3 px-6 text-base font-medium text-[#6B7280] outline-none focus:border-[#6A64F1] focus:shadow-md" />
      </div>

      <div class="mb-5">
        <label for="medicamentos" class="mb-3 block text-base font-medium text-[#07074D]">
          Medicamentos
        </label>
        <input formControlName="medicamentos" type="text" id="medicamentos" placeholder="Medicamentos"
               class="w-full rounded-md border border-[#e0e0e0] bg-white py-3 px-6 text-base font-medium text-[#6B7280] outline-none focus:border-[#6A64F1] focus:shadow-md" />
      </div>

      <div>
        <button type="submit" class="hover:shadow-form w-full rounded-md bg-[#4295e2] py-3 px-8 text-center text-base font-semibold text-white outline-none">
          Guardar
        </button>
      </div>
    </form>
  </div>
</div>
